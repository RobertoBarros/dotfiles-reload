start-at-login = true

# after-startup-command = [
#   'exec-and-forget borders active_color=0xffFF4500 inactive_color=0xffdcdcdc width=8.0 hidpi=on',
# ]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

automatically-unhide-macos-hidden-apps = false
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 15
inner.vertical = 15
# outer.bottom = 10
# outer.left = 10
# outer.right = 10
# outer.top = 2

[mode.main.binding]
# f1 = '''exec-and-forget open -a "Google Chrome"'''
# f2 = '''exec-and-forget open -a "Visual Studio Code"'''
# f3 = '''exec-and-forget open -a "WezTerm"'''
# f4 = '''exec-and-forget open -a "ChatGPT"'''

alt-comma = 'layout accordion horizontal vertical'
alt-slash = 'layout tiles horizontal vertical'

ctrl-alt-down = 'focus down'
ctrl-alt-left = 'focus left'
ctrl-alt-right = 'focus right'
ctrl-alt-up = 'focus up'

ctrl-alt-shift-down = 'move down'
ctrl-alt-shift-left = 'move left'
ctrl-alt-shift-right = 'move right'
ctrl-alt-shift-up = 'move up'

ctrl-alt-cmd-down = 'join-with down'
ctrl-alt-cmd-left = 'join-with left'
ctrl-alt-cmd-right = 'join-with right'
ctrl-alt-cmd-up = 'join-with up'

alt-equal = 'resize smart +50'
alt-minus = 'resize smart -50'
ctrl-alt-equal = 'resize smart +333'
ctrl-alt-minus = 'resize smart -333'

alt-0 = 'workspace 10'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

alt-f = ['''exec-and-forget open -a "Finder"''']
alt-g = ['''exec-and-forget open -a "Gmail"''', 'workspace G']
alt-k = ['''exec-and-forget open -a "Slack"''', 'workspace K']
alt-m = ['''exec-and-forget open -a "Google Meet"''', 'workspace M']
alt-s = ['''exec-and-forget open -a "Spotify"''', 'workspace S']
alt-w = ['''exec-and-forget open -a "WhatsApp"''', 'workspace W']
alt-y = ['''exec-and-forget open -a "Youtube"''', 'workspace Y']
f1 = ['''exec-and-forget open -a "Google Chrome"''', 'workspace C']
f2 = ['''exec-and-forget open -a "Visual Studio Code"''', 'workspace V']
f3 = ['''exec-and-forget open -a "cmux"''', 'workspace T']
f4 = ['''exec-and-forget open -a "ChatGPT"''', 'workspace H']
shift-f1 = '''exec-and-forget $HOME/code/dotfiles-reload/open_chrome_in_tab.sh localhost'''

alt-shift-0 = ['move-node-to-workspace 10', 'workspace 10']
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
alt-shift-c = ['move-node-to-workspace C', 'workspace C']
alt-shift-g = ['move-node-to-workspace G', 'workspace G']
alt-shift-k = ['move-node-to-workspace K', 'workspace K']
alt-shift-m = ['move-node-to-workspace M', 'workspace M']
alt-shift-s = ['move-node-to-workspace S', 'workspace S']
alt-shift-v = ['move-node-to-workspace V', 'workspace V']
alt-shift-w = ['move-node-to-workspace W', 'workspace W']
alt-shift-x = ['move-node-to-workspace X', 'workspace X']
alt-shift-y = ['move-node-to-workspace Y', 'workspace Y']
alt-shift-z = ['move-node-to-workspace Z', 'workspace Z']

alt-n = '''exec-and-forget $HOME/code/dotfiles-reload/aerospace/go_to_first_empty_workspace.sh'''
alt-shift-n = '''exec-and-forget $HOME/code/dotfiles-reload/aerospace/go_to_first_empty_workspace.sh move'''

alt-left = '''exec-and-forget $HOME/code/dotfiles-reload/aerospace/go_to_nonempty_workspace.sh prev'''
alt-right = '''exec-and-forget $HOME/code/dotfiles-reload/aerospace/go_to_nonempty_workspace.sh next'''
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-tab = 'workspace-back-and-forth'
ctrl-alt-r = 'flatten-workspace-tree'

alt-ctrl-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'

alt-shift-e = 'mode service'
[mode.service.binding]
backspace = ['close-all-windows-but-current', 'mode main']
esc = ['reload-config', 'mode main']
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
r = ['flatten-workspace-tree', 'mode main'] # reset layout

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down = 'volume down'
shift-down = ['volume set 0', 'mode main']
up = 'volume up'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Bitwarden'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace V'

[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace H'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.agimnkijcaahngcdmfeangaknmldooml'
run = 'move-node-to-workspace Y'

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.fmgjjmmmlfnkbppncabfkddbjimcfncm'
run = 'move-node-to-workspace G'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace K'

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.kjgfgldnnfoeklkmfkjfagphfepbbdan'
run = 'move-node-to-workspace M'

[workspace-to-monitor-force-assignment]
G = 'secondary'
K = 'secondary'
S = 'secondary'
W = 'secondary'
Y = 'secondary'
